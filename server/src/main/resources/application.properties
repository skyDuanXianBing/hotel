spring.application.name=java-vue-template

# 数据库配置
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/booking_system_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# 服务器端口
server.port=${SERVER_PORT:8082}

# HTTP编码配置
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Spring Boot HTTP编码配置
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# 日志配置
logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# DashScope (千问) 配置
# 请设置您的API密钥，可以通过环境变量DASH_SCOPE_API_KEY或直接在这里配置
# dashscope.api-key=your-api-key-here
dashscope.api-key=${DASH_SCOPE_API_KEY:}
dashscope.model-name=${DASH_SCOPE_MODEL:qwen-turbo}
dashscope.max-tokens=${DASH_SCOPE_MAX_TOKENS:1000}
dashscope.temperature=${DASH_SCOPE_TEMPERATURE:0.7}

# Redis配置
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.timeout=5000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=-1ms

# 邮件配置
# ????
spring.mail.host=${MAIL_HOST:smtp.qq.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:2118908488@qq.com}
spring.mail.password=${MAIL_PASSWORD:pqjhvzvkdfnjdijg}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# JWT配置
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-for-jwt-token-generation-please-change-in-production}
jwt.expiration=86400000
# 验证码配置
verification.code.expiration=300
verification.code.cooldown=60
