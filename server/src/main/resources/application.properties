spring.application.name=java-vue-template

# 读取本地 .env（不提交到仓库）作为配置来源（与环境变量一致）
# 兼容不同启动目录：
# - 在 server 目录启动：./.env
# - 在项目根目录启动（IDE/脚本可能如此）：./server/.env
spring.config.import=optional:file:./.env[.properties],optional:file:./server/.env[.properties]

# 数据库配置
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/booking_system_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
#spring.datasource.password=${DB_PASSWORD:BookingPass123!}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# multipart upload limits (passport image uploads)
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:15MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:15MB}

# JPA 配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway (DB migrations)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=4

# One-time Flyway repair helper:
# If the DB already applied some migrations that are not present locally (e.g. 009/010 removed),
# temporarily set FLYWAY_REPAIR_ON_STARTUP=true to repair schema history and allow startup.
app.flyway.repair-on-startup=${FLYWAY_REPAIR_ON_STARTUP:false}

# Permission enforcement (fine-grained, based on role_permissions)
# Default disabled to avoid breaking existing flows before roles are configured.
permission.enforcement.enabled=${PERMISSION_ENFORCEMENT_ENABLED:false}

# 服务端端口
server.port=${SERVER_PORT:8092}

# HTTP 编码配置
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Spring Boot HTTP 编码配置
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# 日志配置
logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# DashScope（千问）配置
# dashscope.api-key=your-api-key-here
dashscope.api-key=${DASH_SCOPE_API_KEY:}
dashscope.model-name=${DASH_SCOPE_MODEL:qwen-turbo}
dashscope.max-tokens=${DASH_SCOPE_MAX_TOKENS:1000}
dashscope.temperature=${DASH_SCOPE_TEMPERATURE:0.7}

# OpenAI GPT (default) configuration
openai.api-key=${OPENAI_API_KEY:}
openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
openai.model-name=${OPENAI_MODEL:gpt-4o-mini}
openai.max-tokens=${OPENAI_MAX_TOKENS:1000}
openai.temperature=${OPENAI_TEMPERATURE:0.7}

# Redis 配置
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.timeout=5000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=-1ms

# 邮件配置
spring.mail.host=${MAIL_HOST:smtp.qq.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:2118908488@qq.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# JWT 配置
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-for-jwt-token-generation-please-change-in-production}
jwt.expiration=86400000

# 验证码配置
verification.code.expiration=300
verification.code.cooldown=60

# Su Channel Manager API 配置
su.api.base-url=${SU_API_BASE_URL:}
su.api.env=${SU_ENV:sandbox}
su.api.client-id=${SU_CLIENT_ID:c2FpdG9zaG9qaWNvbHRkLnN1aXNzdS5jb20=}
su.api.client-secret=${SU_CLIENT_SECRET:NVI4NWo1Yzc6WWl5OHY2OVc}
su.api.pms-name=${SU_PMS_NAME:HostHub}

# Su Content autosync (Room Types / Rate Plans) - certification strict mode by default
su.content.autosync.roomtype.enabled=${SU_ROOMTYPE_AUTOSYNC_ENABLED:true}
su.content.autosync.roomtype.strict=${SU_ROOMTYPE_AUTOSYNC_STRICT:true}
su.content.autosync.rateplan.enabled=${SU_RATEPLAN_AUTOSYNC_ENABLED:true}
su.content.autosync.rateplan.strict=${SU_RATEPLAN_AUTOSYNC_STRICT:true}

# Su Messaging Webhook Basic Auth（生产环境建议配置；本地/沙盒可留空关闭鉴权）
su.messaging.webhook.username=${SU_MESSAGING_WEBHOOK_USERNAME:}
su.messaging.webhook.password=${SU_MESSAGING_WEBHOOK_PASSWORD:}
su.messaging.ai-auto-reply.sender-name=${SU_MESSAGING_AI_SENDER_NAME:AI客服}
su.messaging.ai-auto-reply.max-input-length=${SU_MESSAGING_AI_MAX_INPUT_LENGTH:1200}

# OTA 自动推送（方案A：每天 12:00 推送；手动“立即同步”也会推送）
ota.sync.enabled=${OTA_SYNC_ENABLED:true}
ota.sync.hour=${OTA_SYNC_HOUR:12}
ota.sync.minute=${OTA_SYNC_MINUTE:0}
ota.sync.days=${OTA_SYNC_DAYS:365}

# Su ARI auto sync (/SUAPI/jservice/availability)
su.ari.autosync.enabled=${SU_ARI_AUTOSYNC_ENABLED:true}
su.ari.autosync.days=${SU_ARI_AUTOSYNC_DAYS:365}
su.ari.autosync.debounceSeconds=${SU_ARI_AUTOSYNC_DEBOUNCE_SECONDS:10}
su.ari.autosync.pollSeconds=${SU_ARI_AUTOSYNC_POLL_SECONDS:10}
su.ari.autosync.batchSize=${SU_ARI_AUTOSYNC_BATCH_SIZE:3}
su.ari.autosync.maxRetryDelayMinutes=${SU_ARI_AUTOSYNC_MAX_RETRY_DELAY_MINUTES:120}

# OTA 预订同步（Su Reservation 拉单 + Reservation_notif 确认）
ota.reservation-sync.enabled=${OTA_RESERVATION_SYNC_ENABLED:true}
ota.reservation-sync.interval-seconds=${OTA_RESERVATION_SYNC_INTERVAL_SECONDS:300}
ota.reservation-sync.initial-delay-seconds=${OTA_RESERVATION_SYNC_INITIAL_DELAY_SECONDS:30}

# PriceLabs API 配置
pricelabs.api.base-url=${PRICELABS_API_BASE_URL:https://api.pricelabs.co/v1/integration/api}
pricelabs.api.integration-name=${PRICELABS_INTEGRATION_NAME:thehosthub}
pricelabs.api.integration-token=${PRICELABS_INTEGRATION_TOKEN:2vlAM9L3UNzwd/R5Vp00JSGEOEaDTjphyggFPKiLQE7eNpKh/HPj/Ppb02Wz43MH}
pricelabs.api.regenerate-token=${PRICELABS_REGENERATE_TOKEN:false}
pricelabs.api.features.delta-only=${PRICELABS_DELTA_ONLY:true}
pricelabs.debug=${PRICELABS_DEBUG:}

# 服务端基础 URL（用于生成 webhook 回调地址）
server.base-url=${SERVER_BASE_URL:https://29f63e4e.r9.cpolar.top}
# 前端基础 URL（用于生成邀请链接、分享链接等；默认跟随 SERVER_BASE_URL，可单独覆盖 APP_FRONTEND_URL）
app.frontend.url=${APP_FRONTEND_URL:${SERVER_BASE_URL:http://localhost:8091}}

# Guest registration (public, no-login)
registration.link.secret=${REGISTRATION_LINK_SECRET:${JWT_SECRET:your-256-bit-secret-key-for-jwt-token-generation-please-change-in-production}}
registration.link.ttl-days=${REGISTRATION_LINK_TTL_DAYS:90}
# Optional: specify a font file path for PDF export to render CJK text correctly (e.g. C:\\Windows\\Fonts\\msyh.ttc)
registration.pdf.font-path=${REGISTRATION_PDF_FONT_PATH:}
# Upload dir for registration attachments (passport images etc.)
registration.upload.dir=${REGISTRATION_UPLOAD_DIR:${user.home}/the-host-hub/uploads/registration}
